<body>
   <section id="contact-us">
    <h1>Contact Us</h1>
    <p>
        Have questions, suggestions, or feedback? We’d love to hear from you!
    </p>

    <h2>Get in Touch</h2>

    <p>
        <strong>Email:</strong> <a href="mailto:info@fastfoodsite.com">info@fastfoodsite.com</a>
    </p>
    <p>
        <strong>Phone:</strong> +383 44 123 456
    </p>
    <p>
        <strong>Address:</strong> Prishtina, Kosovo
    </p>

    <h2>Contact Form</h2>
    <p>Alternatively, you can fill out the form below, and we'll get back to you as soon as possible.</p>

    <form action="submit_contact_form.php" method="POST">
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>
</section>
</section>
